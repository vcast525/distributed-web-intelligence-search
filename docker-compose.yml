services:

  api:
    build: .
    container_name: web-intelligence-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis
      - mongodb
      - elasticsearch

  redis:
    image: redis:7-alpine
    container_name: web-intelligence-redis
    ports:
      - "6379:6379"

  mongodb:
    image: mongo:8
    container_name: web-intelligence-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: web-intelligence-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info --without-gossip --without-mingle --without-heartbeat
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      - redis
      - mongodb
      - elasticsearch

volumes:
  mongodb_data:
  elasticsearch_data: